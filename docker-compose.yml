services:
  postgres:
    image: postgres:16
    container_name: the-vault-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thevault_password}
      POSTGRES_DB: ${POSTGRES_DB:-thevault_db}
    volumes:
      - thevault_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: the-vault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: the-vault-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  thevault_postgres_data:
